name: PSA10 Scout

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd psa10-scout
          pip install -r requirements.txt

      - name: Run price oracle
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEAL_DISCOUNT_THRESHOLD: '0.10'
          FIRE_DEAL_THRESHOLD: '0.25'
          FMV_LOOKBACK_DAYS: '90'
          DB_PATH: 'data/psa10_scout.db'
        run: |
          cd psa10-scout
          python -m agents.price_oracle

      - name: Run listing scout
        env:
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEAL_DISCOUNT_THRESHOLD: '0.10'
          FIRE_DEAL_THRESHOLD: '0.25'
          FMV_LOOKBACK_DAYS: '90'
          DB_PATH: 'data/psa10_scout.db'
        run: |
          cd psa10-scout
          python -m agents.listing_scout
